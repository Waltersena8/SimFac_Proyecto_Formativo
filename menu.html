<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Fogata — Menú Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="Img/favicon.svg">
<link rel="stylesheet" href="CSS/styles.css">
<link rel="stylesheet" href="CSS/menu.css">
</head>
<body>

<div class="app">

  <!-- HERO HEADER -->
  <div class="hero-header">
    <div class="hero-bg"></div>

    <div class="hero-top">
      <a href="index.html" class="hero-simfac">Sim<span>Fac</span></a>
      <div class="mesa-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Mesa 4
      </div>
    </div>

    <div class="hero-content">
      <div class="rest-logo">🍖</div>
      <div class="rest-info">
        <div class="rest-name">La Fogata</div>
        <div class="rest-type">Cocina tradicional colombiana · Cali</div>
        <div class="rest-open"><div class="open-dot"></div> Abierto ahora</div>
      </div>
    </div>

    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="text" id="searchInput" placeholder="Buscar en el menú..." oninput="handleSearch()">
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="cat-tabs-wrap" id="catTabsWrap">
    <div class="cat-tabs" id="catTabs">
      <button class="cat-tab active" data-cat="all" onclick="filterCat('all', this)">
        <span class="tab-emoji">🍽️</span> Todo
        <span class="tab-count" id="tc-all">12</span>
      </button>
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- Featured banner -->
    <div class="featured-banner" id="featuredBanner">
      <div class="feat-emoji">🍖</div>
      <div class="feat-text">
        <div class="feat-label">⭐ Más pedido</div>
        <div class="feat-name">Bandeja Paisa</div>
        <div class="feat-price">$28.000 · Platos fuertes</div>
      </div>
      <button class="feat-btn" onclick="openDetail(1)">Ver →</button>
    </div>

    <!-- Menu sections -->
    <div id="menuContent"></div>

    <!-- Search empty -->
    <div class="search-empty" id="searchEmpty">
      <div class="search-empty-icon">🔍</div>
      <div class="search-empty-title">Sin resultados</div>
      <p class="search-empty-sub">No encontramos productos que coincidan con tu búsqueda.</p>
    </div>

  </div>

</div><!-- .app -->

<!-- CART BAR -->
<div class="cart-bar" id="cartBar">
  <button class="cart-btn" onclick="goToCart()">
    <div class="cart-count" id="cartCount">0</div>
    <div class="cart-label">Ver mi pedido</div>
    <div class="cart-total" id="cartTotal">$0</div>
  </button>
</div>

<!-- PRODUCT DETAIL DRAWER -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetailOutside(event)">
  <div class="detail-drawer" id="detailDrawer">
    <div class="drawer-handle"></div>
    <div class="detail-img" id="detailImg"></div>
    <div class="detail-body">
      <div class="detail-top">
        <div class="detail-name" id="detailName"></div>
        <div class="detail-price" id="detailPrice"></div>
      </div>
      <div class="detail-desc" id="detailDesc"></div>
      <div class="detail-tags" id="detailTags"></div>
      <div class="detail-qty-row">
        <div class="dqr-label">Cantidad</div>
        <div class="qty-control-lg">
          <button class="qty-btn-lg" onclick="changeDetailQty(-1)">−</button>
          <div class="qty-num-lg" id="detailQty">1</div>
          <button class="qty-btn-lg" onclick="changeDetailQty(1)">+</button>
        </div>
      </div>
      <div class="detail-note">
        <label>Nota para cocina (opcional)</label>
        <textarea id="detailNote" placeholder="Ej: Sin cebolla, extra salsa, sin picante..."></textarea>
      </div>
      <button class="btn-add-cart" onclick="addFromDetail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.96-1.59l1.54-7.41H6"/></svg>
        <span id="detailAddText">Agregar · $0</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span id="toastMsg">✓ Agregado al pedido</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="Js/script.js"></script>
<script src="Js/menu.js"></script>
</body>
</html>
